name: Daily PCC Query

on:
  schedule:
    - cron: '0 1 * * 1-5'  # 每週一到五 台灣時間早上 9:00 執行
  workflow_dispatch:         # 也可以在 GitHub 上手動觸發

jobs:
  query:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Run query
        run: node index.js

      - name: Commit result image
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add result_*.png README.md
          git diff --staged --quiet || git commit -m "query result $(date +%Y%m%d)"
          git push
